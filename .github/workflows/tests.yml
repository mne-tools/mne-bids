name: test_suite

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

on:
  push:
    branches: ['**']
    tags: ['**']
  pull_request:
    branches: ['**']
  schedule:
    - cron: "0 4 * * 1"  # every Monday at 4:00 UTC

jobs:
  style:  # takes ~10s
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - uses: pre-commit/action@v3.0.1

  build:
    runs-on: ${{ matrix.os }}
    needs: style  # just to avoid CI overuse
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.14"]  # Oldest and newest supported versions
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip check
        pip install build twine

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Build sdist
      run: python -m build --sdist
    - name: Check sdist
      run: twine check --strict dist/*
    - name: Install sdist
      run: pip install ./dist/mne_bids-*
    - name: Clean up working directory
      run: rm -rf ./*
    - name: Try importing mne_bids
      run: python -c 'import mne_bids; print(mne_bids.__version__)'
    - name: Try cli mne_bids
      run: mne_bids --version
    - name: Remove sdist install
      run: python -m pip uninstall -y mne-bids

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Build wheel
      run: python -m build --wheel
    - name: Check wheel
      run: twine check --strict dist/*
    - name: Install wheel
      run: python -m pip install ./dist/mne_bids-*.whl
    - name: Clean up working directory
      run: rm -rf ./*
    - name: Try importing mne_bids
      run: python -c 'import mne_bids; print(mne_bids.__version__)'
    - name: Try cli mne_bids
      run: mne_bids --version
    - name: Remove wheel install
      run: python -m pip uninstall -y mne-bids

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true
    - name: Test extras install
      run: |
        python -m pip install .[full]
        python -c 'import mne_bids; print(mne_bids.__version__)'
        python -c 'import defusedxml; print(defusedxml.__version__)'
        python -c 'import edfio; print(edfio.__version__)'
        python -c 'import eeglabio; print(eeglabio.__version__)'
        python -c 'import matplotlib; print(matplotlib.__version__)'
        python -c 'import nibabel; print(nibabel.__version__)'
        python -c 'import pandas; print(pandas.__version__)'
        python -c 'import pybv; print(pybv.__version__)'
        python -c 'import pymatreader; print(pymatreader.__version__)'

  test:
    # For GitHub "required" CI checks, add in branch protection:
    #
    # 8 checks:
    # for each machine type (ubuntu, macos, windows):
    # 3.11 / mne-stable / full / validator-stable
    # 3.14 / mne-stable / full / validator-stable
    #
    # 4 additional checks with alternative MNE-Python and BIDS validator versions:
    # ubuntu / 3.14 / mne-main / full / validator-dev -->  to test cutting edge of everything
    # ubuntu / 3.11 / mne-prev / full / validator-stable --> to test last supported mne
    # ubuntu / 3.14 / mne-stable / minimal / validator-stable --> to test a minimal installation
    # macos-15-intel / 3.14 / mne-stable / full / validator-stable --> to test macos x86_64
    name: test (${{ matrix.os }}, ${{ matrix.python-version }}, ${{ matrix.mne-version }}, ${{ matrix.mne-bids-install }}, validator-${{ matrix.bids-validator-version }})
    timeout-minutes: 60
    needs: style  # just to avoid CI overuse
    runs-on: ${{ matrix.os }}
    env:
      BIDS_VALIDATOR_VERSION: ${{ matrix.bids-validator-version }}
      TZ: Europe/Berlin
      FORCE_COLOR: true
      MNE_BIDS_FILELOCK_TIMEOUT: 5  # be more stringent than it would be for end-users
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.14"]  # Newest supported version
        mne-version: [mne-stable]
        mne-bids-install: [full]
        bids-validator-version: [stable]
        test-with-no-testing-data: [false]
        test-mode: [""]

        include:
          # special test runs running only on single CI systems to save resources
          # Test development versions
          - os: ubuntu-latest
            python-version: "3.14"
            mne-version: mne-main
            mne-bids-install: full
            bids-validator-version: dev
            test-with-no-testing-data: true
          # Test previous MNE stable version
          - os: ubuntu-latest
            python-version: "3.11"
            mne-version: mne-prev-stable
            mne-bids-install: full
            bids-validator-version: stable
          # Test minimal mne-bids install
          - os: ubuntu-latest
            python-version: "3.14"
            mne-version: mne-stable
            mne-bids-install: minimal
            bids-validator-version: stable
          # Test macos on x86_64 architecture
          - os: macos-15-intel
            python-version: "3.14"
            mne-version: mne-stable
            mne-bids-install: full
            bids-validator-version: stable
            test-mode: "-m 'not slow'"
    defaults:
      run:
        shell: bash -el {0}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - uses: denoland/setup-deno@v2
      with:
        deno-version: lts

    - uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        activate-environment: true
        cache-dependency-glob: |
          **/pyproject.toml

    - name: Workaround for macOS behavior on login shells
      if: startsWith(matrix.os, 'macos')
      run: echo "export PATH=\"${{ github.workspace }}/.venv/bin:$PATH\"" | tee -a ~/.bash_profile

    - name: Install MNE
      run: |
        git clone https://github.com/mne-tools/mne-python.git
        cd mne-python
        if [[ "${{ matrix.mne-version }}" == 'mne-stable' ]]; then
          git checkout -b maint/1.11 origin/maint/1.11
        elif [[ "${{ matrix.mne-version }}" == 'mne-prev-stable' ]]; then
          git checkout -b maint/1.10 origin/maint/1.10
        elif [[ "${{ matrix.mne-version }}" != 'mne-main' ]]; then
          echo "Unknown MNE version: ${{ matrix.mne-version }}"
          exit 1
        fi
        git status
        uv pip install -e .

    - name: Install MNE-BIDS
      run: |
        if [[ "${{ matrix.mne-bids-install }}" == 'minimal' ]]; then
          KIND="[test]"
        elif [[ "${{ matrix.mne-bids-install }}" == 'full' ]]; then
          KIND="[full,test]"
        else
          echo "Unknown mne-bids-install: ${{ matrix.mne-bids-install }}"
          exit 1
        fi
        set -x
        uv pip install -e ".${KIND}"

    - name: Display versions and environment information
      run: |
        echo "::group::Environment information"
        echo $TZ
        date
        echo "(deno version)"; deno --version || echo ""
        echo "(Requested bids-validator version)"; echo "$BIDS_VALIDATOR_VERSION"
        echo "(python version)"; python --version
        echo "(echo \$PATH)"; tr ':' '\n' <<< "$PATH"
        echo "(which python)"; which python
        echo "(which pytest)"; which pytest
        if [[ "$(which python)" != *'/.venv/'* ]]; then
          echo "Python is NOT running from a virtual environment"
          exit 1
        fi
        echo "::endgroup::"
        echo "::group::MNE-Python information"
        mne sys_info -dp
        echo "::endgroup::"

    # Only run on a limited set of jobs
    - name: Run pytest without testing data
      run: make test
      if: ${{ matrix.test-with-no-testing-data }}

    # Get testing data
    - run: ./tools/get_testing_version.sh
      working-directory: mne-python
      name: 'Get testing version'

    - uses: actions/cache@v5
      with:
        key: testing_data-${{ env.TESTING_VERSION }}
        path: ~/mne_data
      name: 'Cache testing data'

    - run: |
        ./tools/github_actions_download.sh
        TEST_PATH=$(python -c "import mne; print(mne.datasets.testing.data_path(verbose=False))")
        echo "Testing data path: $TEST_PATH"
        chmod -R a-w "$TEST_PATH"
      working-directory: mne-python
      name: 'Get testing data and set it read-only'

    - name: Run pytest
      run: make test ARGS="${{ matrix.test-mode }}"

    - name: Upload coverage stats to codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage.xml
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true
