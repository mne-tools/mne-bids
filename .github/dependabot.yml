version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "[dependabot]"
  - package-ecosystem: "uv"
    directory: "/"
    allow:
      - dependency-type: "all"
    groups:
      deps:
        patterns:
          - "*"
    schedule:
      interval: "weekly"
    labels:
      - "dependabot"
    commit-message:
      prefix: "[dependabot]"
